<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Production Logger</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      padding: 1.25rem 2rem;
      background: #1e293b;
      border-bottom: 1px solid #334155;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 {
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    #timer {
      font-family: "SF Mono", "Cascadia Code", "Consolas", monospace;
      font-size: 1.1rem;
      color: #94a3b8;
    }

    main {
      width: 100%;
      max-width: 720px;
      padding: 2rem 1.5rem;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .controls {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }

    button {
      padding: 0.6rem 1.5rem;
      border: none;
      border-radius: 6px;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    #btn-start {
      background: #22c55e;
      color: #052e16;
    }
    #btn-start:hover:not(:disabled) { background: #16a34a; }

    #btn-log {
      background: #3b82f6;
      color: #fff;
    }
    #btn-log:hover:not(:disabled) { background: #2563eb; }

    #btn-stop {
      background: #ef4444;
      color: #fff;
    }
    #btn-stop:hover:not(:disabled) { background: #dc2626; }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.active { display: flex; }

    .modal {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 1.5rem;
      width: 90%;
      max-width: 480px;
    }

    .modal h2 {
      font-size: 1rem;
      margin-bottom: 1rem;
    }

    .modal textarea {
      width: 100%;
      min-height: 100px;
      padding: 0.75rem;
      background: #0f172a;
      border: 1px solid #475569;
      border-radius: 6px;
      color: #e2e8f0;
      font-family: inherit;
      font-size: 0.95rem;
      resize: vertical;
    }

    .modal textarea:focus {
      outline: none;
      border-color: #3b82f6;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 0.5rem;
      margin-top: 1rem;
    }

    .modal-actions button {
      padding: 0.5rem 1.25rem;
      font-size: 0.875rem;
    }

    #btn-modal-cancel {
      background: #334155;
      color: #e2e8f0;
    }

    #btn-modal-save {
      background: #3b82f6;
      color: #fff;
    }

    /* Log table */
    .log-section h2 {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #64748b;
      margin-bottom: 0.75rem;
    }

    .log-table-wrapper {
      flex: 1;
      overflow-y: auto;
      border: 1px solid #1e293b;
      border-radius: 8px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      position: sticky;
      top: 0;
      background: #1e293b;
      text-align: left;
      padding: 0.6rem 1rem;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #94a3b8;
      border-bottom: 1px solid #334155;
    }

    tbody td {
      padding: 0.6rem 1rem;
      font-size: 0.9rem;
      border-bottom: 1px solid #1e293b;
      vertical-align: top;
    }

    tbody tr:hover { background: #1e293b; }

    td.col-num { width: 3rem; color: #64748b; }
    td.col-time { width: 10rem; font-family: monospace; white-space: nowrap; color: #94a3b8; }
    td.col-elapsed { width: 7rem; font-family: monospace; white-space: nowrap; color: #94a3b8; }

    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: #475569;
    }
  </style>
</head>
<body>

<header>
  <h1>Production Logger</h1>
  <span id="timer">00:00:00</span>
</header>

<main>
  <div class="controls">
    <button id="btn-start">Start</button>
    <button id="btn-log" disabled>Log</button>
    <button id="btn-stop" disabled>Stop</button>
  </div>

  <div class="log-section">
    <h2>Session Log</h2>
    <div class="log-table-wrapper">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Timestamp</th>
            <th>Elapsed</th>
            <th>Note</th>
          </tr>
        </thead>
        <tbody id="log-body">
          <tr class="empty-state-row">
            <td colspan="4" class="empty-state">Press Start to begin a session.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</main>

<!-- Note input modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>Add Log Entry</h2>
    <textarea id="note-input" placeholder="Enter your note..."></textarea>
    <div class="modal-actions">
      <button id="btn-modal-cancel">Cancel</button>
      <button id="btn-modal-save">Save</button>
    </div>
  </div>
</div>

<script>
  const btnStart = document.getElementById("btn-start");
  const btnLog = document.getElementById("btn-log");
  const btnStop = document.getElementById("btn-stop");
  const timerDisplay = document.getElementById("timer");
  const logBody = document.getElementById("log-body");
  const modal = document.getElementById("modal");
  const noteInput = document.getElementById("note-input");
  const btnModalCancel = document.getElementById("btn-modal-cancel");
  const btnModalSave = document.getElementById("btn-modal-save");

  let sessionStart = null;
  let timerInterval = null;
  let entries = [];

  function pad(n) {
    return String(n).padStart(2, "0");
  }

  function formatElapsed(ms) {
    const totalSec = Math.floor(ms / 1000);
    const h = Math.floor(totalSec / 3600);
    const m = Math.floor((totalSec % 3600) / 60);
    const s = totalSec % 60;
    return `${pad(h)}:${pad(m)}:${pad(s)}`;
  }

  function formatTimestamp(date) {
    return date.toLocaleString("en-US", {
      year: "numeric",
      month: "2-digit",
      day: "2-digit",
      hour: "2-digit",
      minute: "2-digit",
      second: "2-digit",
      hour12: false,
    });
  }

  function updateTimer() {
    if (!sessionStart) return;
    timerDisplay.textContent = formatElapsed(Date.now() - sessionStart);
  }

  function clearLog() {
    logBody.innerHTML = "";
  }

  function renderEntry(entry, index) {
    const tr = document.createElement("tr");
    tr.innerHTML =
      `<td class="col-num">${index + 1}</td>` +
      `<td class="col-time">${formatTimestamp(entry.timestamp)}</td>` +
      `<td class="col-elapsed">${formatElapsed(entry.elapsed)}</td>` +
      `<td>${escapeHtml(entry.note)}</td>`;
    logBody.appendChild(tr);
  }

  function escapeHtml(text) {
    const div = document.createElement("div");
    div.textContent = text;
    return div.innerHTML;
  }

  function escapeCsvField(value) {
    const str = String(value);
    if (str.includes(",") || str.includes('"') || str.includes("\n")) {
      return '"' + str.replace(/"/g, '""') + '"';
    }
    return str;
  }

  function downloadCsv() {
    const rows = [["#", "Timestamp", "Elapsed", "Note"]];
    entries.forEach((e, i) => {
      rows.push([
        i + 1,
        formatTimestamp(e.timestamp),
        formatElapsed(e.elapsed),
        e.note,
      ]);
    });

    const csv = rows.map((r) => r.map(escapeCsvField).join(",")).join("\n");
    const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    const dateStr = new Date().toISOString().slice(0, 19).replace(/[T:]/g, "-");
    a.href = url;
    a.download = `production-log-${dateStr}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  }

  // --- Event handlers ---

  btnStart.addEventListener("click", () => {
    sessionStart = Date.now();
    entries = [];
    clearLog();

    btnStart.disabled = true;
    btnLog.disabled = false;
    btnStop.disabled = false;

    timerDisplay.textContent = "00:00:00";
    timerInterval = setInterval(updateTimer, 1000);
  });

  btnLog.addEventListener("click", () => {
    noteInput.value = "";
    modal.classList.add("active");
    noteInput.focus();
  });

  btnModalCancel.addEventListener("click", () => {
    modal.classList.remove("active");
  });

  btnModalSave.addEventListener("click", () => {
    const note = noteInput.value.trim();
    if (!note) return;

    const now = new Date();
    const entry = {
      timestamp: now,
      elapsed: now.getTime() - sessionStart,
      note: note,
    };
    entries.push(entry);
    renderEntry(entry, entries.length - 1);

    modal.classList.remove("active");
  });

  // Save on Enter (Shift+Enter for newline)
  noteInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      btnModalSave.click();
    }
  });

  // Close modal on overlay click
  modal.addEventListener("click", (e) => {
    if (e.target === modal) modal.classList.remove("active");
  });

  btnStop.addEventListener("click", () => {
    clearInterval(timerInterval);

    btnStart.disabled = false;
    btnLog.disabled = true;
    btnStop.disabled = true;

    if (entries.length > 0) {
      downloadCsv();
    }
  });
</script>

</body>
</html>
