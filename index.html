<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Production Logger — track your session notes with timestamps and export to CSV.">
  <title>Production Logger</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      min-height: 100vh;
      padding: 2rem 1rem;
      line-height: 1.6;
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
    }

    /* Header */
    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: #f1f5f9;
      margin-bottom: 0.25rem;
    }

    header p {
      color: #94a3b8;
      font-size: 0.95rem;
    }

    .timer {
      font-family: 'Courier New', monospace;
      font-size: 2.5rem;
      font-weight: 600;
      color: #38bdf8;
      margin-top: 1rem;
      letter-spacing: 0.05em;
    }

    /* Control Bar */
    .control-bar {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }

    button {
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      padding: 0.625rem 1.5rem;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    button:active:not(:disabled) {
      transform: scale(0.97);
    }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-start {
      background: #4ade80;
      color: #0f172a;
    }

    .btn-stop {
      background: #f87171;
      color: #0f172a;
    }

    .btn-log {
      background: #38bdf8;
      color: #0f172a;
    }

    .btn-add {
      background: #38bdf8;
      color: #0f172a;
    }

    .btn-cancel {
      background: #334155;
      color: #f1f5f9;
    }

    /* Note Input Area */
    .note-input-area {
      display: none;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 1rem;
      margin-bottom: 1.5rem;
    }

    .note-input-area.visible {
      display: block;
    }

    .note-input-area label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      color: #94a3b8;
      margin-bottom: 0.5rem;
    }

    .note-input-area textarea {
      width: 100%;
      min-height: 80px;
      background: #0f172a;
      color: #f1f5f9;
      border: 1px solid #334155;
      border-radius: 6px;
      padding: 0.75rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      resize: vertical;
      margin-bottom: 0.75rem;
    }

    .note-input-area textarea::placeholder {
      color: #94a3b8;
    }

    .note-input-area textarea:focus {
      outline: none;
      border-color: #38bdf8;
    }

    .note-actions {
      display: flex;
      gap: 0.5rem;
    }

    /* Log Table */
    .log-section {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      overflow: hidden;
    }

    .log-section caption {
      padding: 0.75rem 1rem;
      text-align: left;
      font-weight: 600;
      font-size: 1rem;
      color: #f1f5f9;
      border-bottom: 1px solid #334155;
    }

    .table-wrapper {
      max-height: 400px;
      overflow-y: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      position: sticky;
      top: 0;
      background: #1e293b;
      text-align: left;
      padding: 0.6rem 0.75rem;
      font-size: 0.8rem;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      border-bottom: 1px solid #334155;
    }

    tbody td {
      padding: 0.6rem 0.75rem;
      font-size: 0.85rem;
      border-bottom: 1px solid #334155;
      vertical-align: top;
    }

    tbody td.col-num {
      color: #94a3b8;
      width: 3rem;
      text-align: center;
    }

    tbody td.col-time {
      font-family: 'Courier New', monospace;
      font-size: 0.8rem;
      white-space: nowrap;
      color: #94a3b8;
    }

    tbody td.col-elapsed {
      font-family: 'Courier New', monospace;
      font-size: 0.8rem;
      white-space: nowrap;
      color: #38bdf8;
    }

    tbody td.col-note {
      color: #f1f5f9;
      word-break: break-word;
    }

    tbody tr {
      animation: fadeIn 0.3s ease-in;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .empty-state {
      padding: 2rem 1rem;
      text-align: center;
      color: #94a3b8;
      font-size: 0.9rem;
    }

    /* Scrollbar */
    .table-wrapper::-webkit-scrollbar {
      width: 6px;
    }

    .table-wrapper::-webkit-scrollbar-track {
      background: #1e293b;
    }

    .table-wrapper::-webkit-scrollbar-thumb {
      background: #334155;
      border-radius: 3px;
    }

    /* Responsive */
    @media (max-width: 480px) {
      body {
        padding: 1rem 0.75rem;
      }

      header h1 {
        font-size: 1.4rem;
      }

      .timer {
        font-size: 2rem;
      }

      .control-bar {
        flex-direction: column;
        align-items: stretch;
      }

      .control-bar button {
        width: 100%;
      }

      thead th, tbody td {
        padding: 0.5rem;
        font-size: 0.78rem;
      }
    }

    @media (min-width: 481px) and (max-width: 768px) {
      body {
        padding: 1.5rem 1.25rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Production Logger</h1>
      <p>Track your session notes with timestamps</p>
      <div class="timer" id="timer" aria-live="polite">00:00:00</div>
    </header>

    <main>
      <section class="control-bar" aria-label="Session controls">
        <button class="btn-start" id="btnStart" aria-label="Start session">Start</button>
        <button class="btn-stop" id="btnStop" aria-label="Stop session and export CSV" disabled>Stop</button>
        <button class="btn-log" id="btnLog" aria-label="Log a new note" disabled>Log</button>
      </section>

      <section class="note-input-area" id="noteInputArea" aria-label="Add a note">
        <label for="noteText">New note</label>
        <textarea id="noteText" placeholder="Enter your note…"></textarea>
        <div class="note-actions">
          <button class="btn-add" id="btnAddNote" aria-label="Add note to log">Add Note</button>
          <button class="btn-cancel" id="btnCancel" aria-label="Cancel adding note">Cancel</button>
        </div>
      </section>

      <section class="log-section" aria-label="Session log">
        <table>
          <caption>Session Log</caption>
          <thead>
            <tr>
              <th scope="col">#</th>
              <th scope="col">Timestamp</th>
              <th scope="col">Elapsed</th>
              <th scope="col">Note</th>
            </tr>
          </thead>
        </table>
        <div class="table-wrapper" id="tableWrapper">
          <table>
            <tbody id="logBody"></tbody>
          </table>
          <div class="empty-state" id="emptyState">
            No logs yet. Start a session and click Log to add notes.
          </div>
        </div>
      </section>
    </main>
  </div>

  <script>
    (function () {
      'use strict';

      const btnStart = document.getElementById('btnStart');
      const btnStop = document.getElementById('btnStop');
      const btnLog = document.getElementById('btnLog');
      const btnAddNote = document.getElementById('btnAddNote');
      const btnCancel = document.getElementById('btnCancel');
      const noteInputArea = document.getElementById('noteInputArea');
      const noteText = document.getElementById('noteText');
      const timerDisplay = document.getElementById('timer');
      const logBody = document.getElementById('logBody');
      const emptyState = document.getElementById('emptyState');
      const tableWrapper = document.getElementById('tableWrapper');

      let sessionActive = false;
      let timerInterval = null;
      let sessionStartTime = null;
      let entryCount = 0;
      let entries = [];

      function formatDuration(ms) {
        const totalSeconds = Math.floor(ms / 1000);
        const h = String(Math.floor(totalSeconds / 3600)).padStart(2, '0');
        const m = String(Math.floor((totalSeconds % 3600) / 60)).padStart(2, '0');
        const s = String(totalSeconds % 60).padStart(2, '0');
        return h + ':' + m + ':' + s;
      }

      function updateTimer() {
        if (!sessionStartTime) return;
        const elapsed = Date.now() - sessionStartTime;
        timerDisplay.textContent = formatDuration(elapsed);
      }

      function startSession() {
        sessionActive = true;
        sessionStartTime = Date.now();
        entryCount = 0;
        entries = [];
        logBody.innerHTML = '';
        emptyState.style.display = '';
        timerDisplay.textContent = '00:00:00';

        timerInterval = setInterval(updateTimer, 1000);

        btnStart.disabled = true;
        btnStop.disabled = false;
        btnLog.disabled = false;
      }

      function stopSession() {
        sessionActive = false;
        clearInterval(timerInterval);
        timerInterval = null;

        if (entries.length > 0) {
          exportCSV();
        }

        sessionStartTime = null;
        timerDisplay.textContent = '00:00:00';
        hideNoteInput();

        btnStart.disabled = false;
        btnStop.disabled = true;
        btnLog.disabled = true;
      }

      function showNoteInput() {
        noteInputArea.classList.add('visible');
        noteText.value = '';
        noteText.focus();
      }

      function hideNoteInput() {
        noteInputArea.classList.remove('visible');
        noteText.value = '';
      }

      function addNote() {
        const text = noteText.value.trim();
        if (!text || !sessionActive) return;

        entryCount++;
        const now = new Date();
        const elapsed = Date.now() - sessionStartTime;

        const entry = {
          num: entryCount,
          timestamp: now.toLocaleString(),
          elapsed: formatDuration(elapsed),
          note: text,
        };
        entries.push(entry);

        emptyState.style.display = 'none';

        const tr = document.createElement('tr');
        tr.innerHTML =
          '<td class="col-num">' + escapeHTML(String(entry.num)) + '</td>' +
          '<td class="col-time">' + escapeHTML(entry.timestamp) + '</td>' +
          '<td class="col-elapsed">' + escapeHTML(entry.elapsed) + '</td>' +
          '<td class="col-note">' + escapeHTML(entry.note) + '</td>';
        logBody.appendChild(tr);

        tableWrapper.scrollTop = tableWrapper.scrollHeight;

        hideNoteInput();
      }

      function escapeHTML(str) {
        var div = document.createElement('div');
        div.appendChild(document.createTextNode(str));
        return div.innerHTML;
      }

      function escapeCSVField(field) {
        var str = String(field);
        if (str.indexOf(',') !== -1 || str.indexOf('"') !== -1 || str.indexOf('\n') !== -1) {
          return '"' + str.replace(/"/g, '""') + '"';
        }
        return str;
      }

      function exportCSV() {
        var rows = ['Entry #,Timestamp (Local),Elapsed Time,Note'];
        for (var i = 0; i < entries.length; i++) {
          var e = entries[i];
          rows.push(
            escapeCSVField(e.num) + ',' +
            escapeCSVField(e.timestamp) + ',' +
            escapeCSVField(e.elapsed) + ',' +
            escapeCSVField(e.note)
          );
        }
        var csvContent = rows.join('\n');

        var blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        var url = URL.createObjectURL(blob);

        var now = new Date();
        var y = now.getFullYear();
        var mo = String(now.getMonth() + 1).padStart(2, '0');
        var d = String(now.getDate()).padStart(2, '0');
        var filename = 'session-log-' + y + '-' + mo + '-' + d + '.csv';

        var link = document.createElement('a');
        link.href = url;
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
      }

      // Event listeners
      btnStart.addEventListener('click', startSession);
      btnStop.addEventListener('click', stopSession);
      btnLog.addEventListener('click', showNoteInput);
      btnAddNote.addEventListener('click', addNote);
      btnCancel.addEventListener('click', hideNoteInput);

      noteText.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          addNote();
        }
      });
    })();
  </script>
</body>
</html>
